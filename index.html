<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>ai-ojt</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #000; font-family: -apple-system, 'Hiragino Sans', sans-serif; color: #fff; min-height: 100dvh; display: flex; flex-direction: column; }

  /* ── モード選択 ── */
  .mode-bar {
    display: flex; gap: 0; flex-shrink: 0; border-bottom: 1px solid #222;
  }
  .mode-btn {
    flex: 1; padding: 12px 8px; text-align: center; font-size: 13px; font-weight: 600;
    background: #111; border: none; color: #888; cursor: pointer; transition: all 0.2s;
    border-bottom: 2px solid transparent;
  }
  .mode-btn.active { color: #fff; background: #1a1a1a; border-bottom-color: #4a90e2; }
  .mode-btn:not(.active):hover { color: #aaa; }

  /* ── カメラ ── */
  .camera-area {
    position: relative; width: 100%; background: #111; overflow: hidden; flex-shrink: 0;
    transition: height 0.4s ease;
  }
  .camera-area.full { height: 480px; }
  .camera-area.compact { height: 280px; }
  .camera-area.mini { height: 160px; }
  .camera-area.hidden { height: 0; }
  #cameraVideo { width: 100%; height: 100%; object-fit: cover; display: block; transition: object-fit 0.3s; }

  /* ── 横向き時 ── */
  .orientation-badge {
    position: absolute; top: 6px; left: 6px; background: rgba(0,0,0,0.6);
    padding: 2px 8px; border-radius: 10px; font-size: 9px; color: #aaa;
    pointer-events: none; transition: opacity 0.3s;
  }
  @media (orientation: landscape) {
    .camera-area.full { height: 60vh; }
    .camera-area.compact { height: 35vh; }
    .camera-area.mini { height: 15vh; }
    #cameraVideo { object-fit: contain; }
    .mode-bar { padding: 4px 0; }
    .mode-btn { padding: 8px 6px; font-size: 12px; }
    .controls { padding: 6px 14px; }
    .recommend-chips { margin-top: 4px; }
    .results { padding: 6px 14px; }
  }
  #cameraCanvas { display: none; }
  .camera-overlay {
    position: absolute; bottom: 0; left: 0; right: 0; padding: 6px 12px;
    background: linear-gradient(transparent, rgba(0,0,0,0.8));
    display: flex; justify-content: space-between; align-items: center; font-size: 11px;
  }
  .status-dot { width: 6px; height: 6px; border-radius: 50%; display: inline-block; margin-right: 4px; }
  .status-dot.live { background: #4ade80; animation: pulse 2s infinite; }
  .status-dot.off { background: #666; }
  @keyframes pulse { 0%,100%{opacity:1}50%{opacity:0.4} }

  .camera-error {
    position: absolute; inset: 0; display: flex; flex-direction: column;
    align-items: center; justify-content: center; text-align: center;
    background: #111; padding: 20px; gap: 10px;
  }
  .camera-error p { color: #aaa; font-size: 12px; line-height: 1.5; }

  /* ── スクリーンショット読込 ── */
  .screenshot-area {
    padding: 20px; text-align: center; display: none; flex-shrink: 0; background: #111;
  }
  .screenshot-area.show { display: block; }
  .drop-zone {
    border: 2px dashed #444; border-radius: 12px; padding: 30px; cursor: pointer;
    transition: border-color 0.2s;
  }
  .drop-zone:hover, .drop-zone.drag-over { border-color: #4a90e2; }
  .drop-zone p { color: #888; font-size: 13px; }
  .drop-zone .icon { font-size: 28px; margin-bottom: 8px; }
  #ssPreview { max-width: 100%; max-height: 160px; border-radius: 6px; margin-top: 10px; display: none; }

  /* ── 撮影キュー（サムネイル横並び） ── */
  .capture-queue {
    display: none; flex-shrink: 0; background: #0a0a0a; padding: 8px 10px;
    overflow-x: auto; white-space: nowrap; gap: 8px; border-bottom: 1px solid #222;
  }
  .capture-queue.show { display: flex; }
  .queue-item {
    display: inline-flex; flex-direction: column; align-items: center; gap: 4px;
    min-width: 80px; position: relative; flex-shrink: 0;
  }
  .queue-item img {
    width: 80px; height: 60px; object-fit: cover; border-radius: 6px;
    border: 2px solid #333; cursor: pointer; transition: border-color 0.2s;
  }
  .queue-item img:hover { border-color: #4a90e2; }
  .queue-item.analyzing img { border-color: #4a90e2; animation: glow 1.5s ease-in-out infinite; }
  .queue-item.done img { border-color: #4ade80; }
  .queue-item .queue-status {
    font-size: 9px; color: #666; text-align: center; max-width: 80px;
    overflow: hidden; text-overflow: ellipsis;
  }
  .queue-item .queue-status.pending { color: #888; }
  .queue-item .queue-status.analyzing { color: #4a90e2; }
  .queue-item .queue-status.done { color: #4ade80; }
  .queue-item .queue-remove {
    position: absolute; top: -4px; right: -4px; width: 18px; height: 18px;
    background: #e74c3c; border: none; border-radius: 50%; color: #fff;
    font-size: 10px; cursor: pointer; display: flex; align-items: center; justify-content: center;
    line-height: 1;
  }
  @keyframes glow { 0%,100%{box-shadow:0 0 4px rgba(74,144,226,0.3)}50%{box-shadow:0 0 12px rgba(74,144,226,0.6)} }

  /* ── コントロール ── */
  .controls { background: #1a1a1a; padding: 10px 14px; flex-shrink: 0; }
  .prompt-input {
    width: 100%; background: #2a2a2a; border: 1px solid #3a3a3a; border-radius: 8px;
    padding: 8px 10px; color: #fff; font-size: 13px; resize: none; outline: none;
    font-family: inherit; min-height: 40px;
  }
  .prompt-input:focus { border-color: #4a90e2; }
  .button-row { display: flex; gap: 8px; margin-top: 8px; align-items: center; }
  .capture-btn {
    flex: 1; background: #4a90e2; border: none; border-radius: 8px;
    padding: 11px; color: #fff; font-size: 13px; font-weight: 600; cursor: pointer; transition: all 0.2s;
  }
  .capture-btn:hover { background: #3a80d2; }
  .capture-btn:active { transform: scale(0.97); }
  .capture-btn:disabled { opacity: 0.5; pointer-events: none; }
  .analyze-all-btn {
    background: #4ade80; border: none; border-radius: 8px;
    padding: 11px 16px; color: #000; font-size: 13px; font-weight: 600; cursor: pointer;
    transition: all 0.2s; display: none;
  }
  .analyze-all-btn.show { display: block; }
  .analyze-all-btn:hover { background: #3bce70; }
  .analyze-all-btn:disabled { opacity: 0.5; pointer-events: none; }

  .options-row { display: flex; gap: 12px; margin-top: 8px; align-items: center; flex-wrap: wrap; }
  .speed-toggle { display: flex; align-items: center; gap: 6px; font-size: 11px; color: #aaa; }
  .speed-label { font-size: 10px; padding: 2px 6px; border-radius: 6px; font-weight: 600; }
  .speed-label.fast { background: #4ade80; color: #000; }
  .speed-label.normal { background: #4a90e2; color: #fff; }
  .auto-toggle { display: flex; align-items: center; gap: 6px; font-size: 11px; color: #aaa; }
  .toggle-switch {
    width: 40px; height: 22px; background: #3a3a3a; border-radius: 11px;
    position: relative; cursor: pointer; transition: background 0.3s;
  }
  .toggle-switch.on { background: #4ade80; }
  .toggle-switch::after {
    content: ''; position: absolute; width: 18px; height: 18px;
    background: #fff; border-radius: 50%; top: 2px; left: 2px; transition: left 0.3s;
  }
  .toggle-switch.on::after { left: 20px; }

  /* ── 処理中インジケーター（コンパクト版） ── */
  .processing-bar {
    display: none; background: #1a2030; padding: 8px 14px; flex-shrink: 0;
    border-bottom: 1px solid #222; align-items: center; gap: 10px;
  }
  .processing-bar.show { display: flex; }
  .processing-bar .spinner-sm { flex-shrink: 0; }
  .processing-bar .proc-text { font-size: 12px; color: #4a90e2; }
  .processing-bar .proc-count { font-size: 10px; color: #666; margin-left: auto; }

  /* ── 結果表示 ── */
  .results { flex: 1; overflow-y: auto; padding: 10px 14px; }
  .results::-webkit-scrollbar { width: 4px; }
  .results::-webkit-scrollbar-thumb { background: #333; border-radius: 2px; }

  .result-card { background: #1a1a1a; border-radius: 10px; padding: 12px; margin-bottom: 10px; animation: slideUp 0.3s ease-out; }
  @keyframes slideUp { from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:translateY(0)} }

  .result-time { color: #555; font-size: 10px; margin-bottom: 6px; }
  .badge { font-size: 9px; padding: 2px 6px; border-radius: 8px; font-weight: 600; background: #4a90e2; color: #fff; margin-left: 4px; }
  .badge.fast { background: #4ade80; color: #000; }

  .section { margin-bottom: 8px; padding-bottom: 8px; border-bottom: 1px solid #2a2a2a; }
  .section-title { font-size: 11px; font-weight: 700; margin-bottom: 4px; }
  .section-title.analysis { color: #4a90e2; }
  .section-title.nextsteps { color: #4ade80; }

  .next-steps-box { background: #1c2a1c; border-left: 3px solid #4ade80; border-radius: 8px; padding: 10px; margin-bottom: 8px; }

  .body-text { font-size: 13px; line-height: 1.6; color: #e5e5e5; white-space: pre-wrap; }

  .followup-block { margin: 6px 0; padding-left: 10px; border-left: 2px solid #444; }
  .q-text { color: #ffd166; font-size: 11px; font-weight: 600; margin-bottom: 2px; }
  .a-text { color: #e5e5e5; font-size: 12px; line-height: 1.5; white-space: pre-wrap; }

  .followup-row { display: flex; gap: 6px; margin-top: 8px; }
  .followup-input {
    flex: 1; background: #2a2a2a; border: 1px solid #3a3a3a; border-radius: 6px;
    padding: 7px 10px; color: #fff; font-size: 12px; outline: none; font-family: inherit;
  }
  .ask-btn { background: #4a90e2; border: none; border-radius: 6px; padding: 7px 12px; color: #fff; font-size: 11px; font-weight: 600; cursor: pointer; }

  .ocr-toggle { color: #444; font-size: 10px; margin-top: 8px; cursor: pointer; }
  .ocr-text { color: #444; font-size: 9px; font-family: monospace; line-height: 1.4; margin-top: 3px; white-space: pre-wrap; display: none; }
  .ocr-text.show { display: block; }

  .expand-cam-btn { text-align: center; padding: 6px; color: #4a90e2; font-size: 11px; cursor: pointer; }

  .empty-text { color: #555; text-align: center; padding: 30px 20px; font-size: 13px; line-height: 1.7; }

  .spinner-sm { display: inline-block; width: 12px; height: 12px; border: 2px solid rgba(255,255,255,0.3); border-top-color: #fff; border-radius: 50%; animation: spin 0.8s linear infinite; }
  @keyframes spin { to{transform:rotate(360deg)} }

  /* ── AI プロバイダー選択 ── */
  .ai-selector {
    display: flex; gap: 6px; align-items: center; flex-wrap: wrap;
  }
  .ai-chip {
    padding: 5px 10px; border-radius: 14px; font-size: 11px; font-weight: 600;
    border: 1.5px solid #3a3a3a; background: #2a2a2a; color: #888;
    cursor: pointer; transition: all 0.2s; white-space: nowrap;
  }
  .ai-chip:hover { border-color: #666; color: #ccc; }
  .ai-chip.active { color: #fff; }
  .ai-chip.claude.active { background: #d97706; border-color: #d97706; }
  .ai-chip.chatgpt.active { background: #10a37f; border-color: #10a37f; }
  .ai-chip.gemini.active { background: #4285f4; border-color: #4285f4; }
  .ai-chip.unavailable { opacity: 0.35; pointer-events: none; }
  .ai-chip .ai-dot { width: 6px; height: 6px; border-radius: 50%; display: inline-block; margin-right: 4px; }
  .ai-dot.claude { background: #d97706; }
  .ai-dot.chatgpt { background: #10a37f; }
  .ai-dot.gemini { background: #4285f4; }

  /* 結果カードのプロバイダーバッジ */
  .badge.claude { background: #d97706; color: #fff; }
  .badge.chatgpt { background: #10a37f; color: #fff; }
  .badge.gemini { background: #4285f4; color: #fff; }

  /* ── 動画録画UI ── */
  .video-rec-bar {
    display: none; flex-shrink: 0; background: #1a0a0a; padding: 10px 14px;
    align-items: center; gap: 10px; border-bottom: 1px solid #300;
  }
  .video-rec-bar.show { display: flex; }
  .rec-dot { width: 10px; height: 10px; background: #e74c3c; border-radius: 50%; animation: recBlink 1s infinite; }
  @keyframes recBlink { 0%,100%{opacity:1}50%{opacity:0.3} }
  .rec-timer { font-size: 16px; font-weight: 700; color: #e74c3c; font-family: monospace; }
  .rec-label { font-size: 11px; color: #aaa; }
  .rec-stop-btn {
    margin-left: auto; background: #e74c3c; border: none; border-radius: 8px;
    padding: 8px 16px; color: #fff; font-size: 12px; font-weight: 600; cursor: pointer;
  }
  .rec-stop-btn:hover { background: #c0392b; }

  /* 動画プレビュー＆質問エリア */
  .video-preview-area {
    display: none; flex-shrink: 0; background: #111; padding: 12px; text-align: center;
  }
  .video-preview-area.show { display: block; }
  .video-preview-area .vp-info {
    color: #4a90e2; font-size: 12px; font-weight: 600; margin-bottom: 8px;
  }
  .video-preview-area .vp-thumbs {
    display: flex; gap: 4px; overflow-x: auto; justify-content: center; margin-bottom: 10px;
  }
  .video-preview-area .vp-thumbs img {
    width: 60px; height: 45px; object-fit: cover; border-radius: 4px; border: 1px solid #333;
  }
  .video-preview-area .vp-actions {
    display: flex; gap: 8px; justify-content: center;
  }
  .video-preview-area .vp-actions button {
    padding: 9px 18px; border: none; border-radius: 8px; font-size: 13px; font-weight: 600; cursor: pointer;
  }
  .vp-retake { background: #3a3a3a; color: #fff; }
  .vp-analyze { background: #4ade80; color: #000; }

  #ssFileInput { display: none; }

  /* ── プロンプト入力エリア ── */
  .prompt-wrap {
    position: relative;
  }
  .prompt-clear {
    position: absolute; right: 8px; top: 50%; transform: translateY(-50%);
    width: 22px; height: 22px; background: #555; border: none; border-radius: 50%;
    color: #fff; font-size: 12px; cursor: pointer; display: none;
    align-items: center; justify-content: center; line-height: 1;
  }
  .prompt-clear.show { display: flex; }
  .prompt-clear:hover { background: #e74c3c; }

  /* ── レコメンドチップ ── */
  .recommend-chips {
    display: flex; gap: 6px; margin-top: 6px; overflow-x: auto; padding-bottom: 2px;
    -webkit-overflow-scrolling: touch;
  }
  .recommend-chips::-webkit-scrollbar { height: 0; }
  .chip {
    flex-shrink: 0; padding: 6px 12px; background: #2a2a2a; border: 1px solid #3a3a3a;
    border-radius: 16px; color: #ccc; font-size: 11px; cursor: pointer;
    transition: all 0.2s; white-space: nowrap;
  }
  .chip:hover { background: #3a3a3a; border-color: #4a90e2; color: #fff; }
  .chip.active { background: #4a90e2; border-color: #4a90e2; color: #fff; }

  /* ── キュー選択状態 ── */
  .queue-item.selected img { border-color: #ffd166 !important; box-shadow: 0 0 8px rgba(255,209,102,0.5); }
  .queue-item .queue-select-badge {
    position: absolute; bottom: 18px; left: 50%; transform: translateX(-50%);
    background: #ffd166; color: #000; font-size: 8px; font-weight: 700;
    padding: 1px 5px; border-radius: 4px; display: none;
  }
  .queue-item.selected .queue-select-badge { display: block; }
  .analyze-selected-btn {
    background: #ffd166; border: none; border-radius: 8px;
    padding: 11px 16px; color: #000; font-size: 13px; font-weight: 600; cursor: pointer;
    transition: all 0.2s; display: none;
  }
  .analyze-selected-btn.show { display: block; }
  .analyze-selected-btn:hover { background: #ffc233; }
  .analyze-selected-btn:disabled { opacity: 0.5; pointer-events: none; }
</style>
</head>
<body>

<!-- モード選択バー -->
<div class="mode-bar">
  <button class="mode-btn" id="modeSS" onclick="setMode('screenshot')">🖼️ スクショ</button>
  <button class="mode-btn active" id="modeStill" onclick="setMode('still')">📷 連続撮影</button>
  <button class="mode-btn" id="modeVideo" onclick="setMode('video')">🎬 動画</button>
</div>

<!-- カメラプレビュー -->
<div class="camera-area full" id="cameraArea">
  <video id="cameraVideo" autoplay playsinline muted></video>
  <canvas id="cameraCanvas"></canvas>
  <div class="orientation-badge" id="orientBadge">📱 縦向き</div>
  <div class="camera-overlay">
    <span><span class="status-dot" id="statusDot"></span><span id="statusText">起動中...</span></span>
    <span style="display:flex;align-items:center;gap:6px">
      <button onclick="switchCamera()" style="background:rgba(255,255,255,0.2);border:none;color:#fff;padding:3px 8px;border-radius:4px;font-size:10px;cursor:pointer">🔄</button>
      <span id="timeStamp" style="font-size:9px;color:#666"></span>
    </span>
  </div>
</div>

<!-- スクリーンショット読込エリア -->
<div class="screenshot-area" id="ssArea">
  <div class="drop-zone" id="dropZone" onclick="document.getElementById('ssFileInput').click()">
    <div class="icon">📁</div>
    <p>タップして画像を選択<br><span style="font-size:11px;color:#666">またはドラッグ＆ドロップ</span></p>
  </div>
  <img id="ssPreview">
  <input type="file" id="ssFileInput" accept="image/*">
</div>

<!-- 撮影キュー（サムネイル横並び） -->
<div class="capture-queue" id="captureQueue"></div>

<!-- 動画録画バー -->
<div class="video-rec-bar" id="videoRecBar">
  <div class="rec-dot"></div>
  <span class="rec-timer" id="recTimer">00:00</span>
  <span class="rec-label">/ 60秒</span>
  <button class="rec-stop-btn" onclick="stopVideoRecording()">⏹ 録画停止</button>
</div>

<!-- 動画プレビュー＆質問エリア -->
<div class="video-preview-area" id="videoPreviewArea">
  <div class="vp-info" id="vpInfo">🎬 録画完了</div>
  <div class="vp-thumbs" id="vpThumbs"></div>
  <div class="vp-actions">
    <button class="vp-retake" onclick="retakeVideo()">🔄 撮り直す</button>
    <button class="vp-analyze" onclick="analyzeVideoFrames()">🧠 解析する</button>
  </div>
</div>

<!-- 処理中バー（コンパクト） -->
<div class="processing-bar" id="processingBar">
  <div class="spinner-sm"></div>
  <span class="proc-text" id="procText">解析中...</span>
  <span class="proc-count" id="procCount"></span>
</div>

<!-- コントロール -->
<div class="controls">
  <div class="prompt-wrap">
    <textarea class="prompt-input" id="promptInput" rows="1" placeholder="質問（省略可）" oninput="onPromptInput()"></textarea>
    <button class="prompt-clear" id="promptClear" onclick="clearPrompt()">×</button>
  </div>
  <div class="recommend-chips" id="recommendChips">
    <div class="chip" onclick="selectChip(this)">🔍 ソースコードを解析して</div>
    <div class="chip" onclick="selectChip(this)">📐 設計を要約して</div>
    <div class="chip" onclick="selectChip(this)">🤔 何をして欲しいか推論して</div>
    <div class="chip" onclick="selectChip(this)">🐛 エラーの原因を教えて</div>
    <div class="chip" onclick="selectChip(this)">💡 改善点を提案して</div>
    <div class="chip" onclick="selectChip(this)">📝 手順を説明して</div>
  </div>
  <div class="button-row">
    <button class="capture-btn" id="captureBtn" onclick="onCaptureClick()">📷 撮影</button>
    <button class="analyze-selected-btn" id="analyzeSelectedBtn" onclick="analyzeSelected()">🧠 選択を解析</button>
    <button class="analyze-all-btn" id="analyzeAllBtn" onclick="analyzeQueue()">🧠 全て解析</button>
  </div>
  <div class="options-row">
    <div class="ai-selector" id="aiSelector">
      <span style="font-size:10px;color:#666">AI:</span>
      <div class="ai-chip claude active" onclick="selectProvider('claude')"><span class="ai-dot claude"></span>Claude</div>
      <div class="ai-chip chatgpt" onclick="selectProvider('chatgpt')"><span class="ai-dot chatgpt"></span>ChatGPT</div>
      <div class="ai-chip gemini" onclick="selectProvider('gemini')"><span class="ai-dot gemini"></span>Gemini</div>
    </div>
  </div>
  <div class="options-row" style="margin-top:4px">
    <div class="speed-toggle">
      <span>速度:</span>
      <div class="toggle-switch" id="speedToggle" onclick="toggleSpeed()"></div>
      <span class="speed-label normal" id="speedLabel">通常</span>
    </div>
    <div class="auto-toggle" id="autoToggleWrap">
      <span>自動</span>
      <div class="toggle-switch" id="autoToggle" onclick="toggleAuto()"></div>
    </div>
  </div>
</div>

<!-- 結果 -->
<div class="results" id="results">
  <div class="empty-text">📷 撮影ボタンで連続撮影<br>🧠 まとめて解析ボタンで一括解析<br><br>⚡ 高速モードで2〜4秒</div>
</div>

<script>
const BACKEND_URL = window.location.origin;

let cameraStream = null;
let isProcessing = false;
let autoTimer = null;
let resultList = [];
let currentDeviceIdx = -1;
let videoDevices = [];
let currentMode = 'still'; // 'still' | 'video' | 'screenshot'
let screenshotBase64 = null;
let speedMode = 'normal'; // 'fast' | 'normal'
let aiProvider = 'claude'; // 'claude' | 'chatgpt' | 'gemini'

// 動画録画
let isRecording = false;
let recordingTimer = null;
let recordingStartTime = 0;
let recordedFrames = []; // { base64, dataUrl, timestamp }
const VIDEO_MAX_SECONDS = 60;
const VIDEO_CAPTURE_INTERVAL = 3000; // 3秒ごとにフレームキャプチャ
let videoCaptureTimer = null;

// 撮影キュー
let captureQueue = []; // { id, base64, dataUrl, status: 'pending'|'analyzing'|'done', result, selected }
let queueIdCounter = 0;
let selectedQueueIds = new Set(); // 選択中の画像ID

const STILL_INTERVAL = 3200;
const MOTION_INTERVAL = 30000;
let currentInterval = STILL_INTERVAL;
let prevFrameData = null;
let motionCheckTimer = null;
const MOTION_THRESHOLD = 5;

const video  = document.getElementById('cameraVideo');
const canvas = document.getElementById('cameraCanvas');
const ctx    = canvas.getContext('2d');

// ══════════════════════════════════════
// AIプロバイダー選択
// ══════════════════════════════════════
function selectProvider(provider) {
  aiProvider = provider;
  document.querySelectorAll('.ai-chip').forEach(c => c.classList.remove('active'));
  document.querySelector(`.ai-chip.${provider}`).classList.add('active');
}

async function checkProviders() {
  try {
    const res = await fetch(`${BACKEND_URL}/providers`);
    if (!res.ok) return;
    const data = await res.json();
    for (const [key, info] of Object.entries(data)) {
      const chip = document.querySelector(`.ai-chip.${key}`);
      if (chip && !info.available) {
        chip.classList.add('unavailable');
        chip.title = `${info.label}: APIキー未設定`;
      }
    }
  } catch (e) { /* サーバー未起動時は無視 */ }
}

// ══════════════════════════════════════
// プロンプト入力 & レコメンド
// ══════════════════════════════════════
function onPromptInput() {
  const val = document.getElementById('promptInput').value;
  document.getElementById('promptClear').classList.toggle('show', val.length > 0);
  // チップのアクティブ解除
  if (val.length === 0) {
    document.querySelectorAll('.chip').forEach(c => c.classList.remove('active'));
  }
}

function clearPrompt() {
  document.getElementById('promptInput').value = '';
  document.getElementById('promptClear').classList.remove('show');
  document.querySelectorAll('.chip').forEach(c => c.classList.remove('active'));
  document.getElementById('promptInput').focus();
}

function selectChip(el) {
  const wasActive = el.classList.contains('active');
  document.querySelectorAll('.chip').forEach(c => c.classList.remove('active'));

  if (wasActive) {
    // 同じチップを押したら解除
    document.getElementById('promptInput').value = '';
    document.getElementById('promptClear').classList.remove('show');
  } else {
    el.classList.add('active');
    // チップのテキストからアイコンを除去してセット
    const text = el.textContent.replace(/^[^\s]+\s/, '');
    document.getElementById('promptInput').value = text;
    document.getElementById('promptClear').classList.add('show');
  }
}

  document.querySelectorAll('.mode-btn').forEach(b => b.classList.remove('active'));

  const cam = document.getElementById('cameraArea');
  const ss  = document.getElementById('ssArea');
  const autoWrap = document.getElementById('autoToggleWrap');
  const btn = document.getElementById('captureBtn');
  const analyzeBtn = document.getElementById('analyzeAllBtn');

  // プレビューキューをクリア
  document.getElementById('captureQueue').classList.remove('show');

  if (mode === 'screenshot') {
    document.getElementById('modeSS').classList.add('active');
    cam.className = 'camera-area hidden';
    ss.classList.add('show');
    autoWrap.style.display = 'none';
    btn.textContent = '🖼️ スクリーンショット解析';
    analyzeBtn.classList.remove('show');
    if (autoTimer) { toggleAuto(); }
  } else if (mode === 'still') {
    document.getElementById('modeStill').classList.add('active');
    cam.className = 'camera-area full';
    ss.classList.remove('show');
    autoWrap.style.display = 'flex';
    btn.textContent = '📷 撮影';
    currentInterval = STILL_INTERVAL;
  } else if (mode === 'video') {
    document.getElementById('modeVideo').classList.add('active');
    cam.className = 'camera-area full';
    ss.classList.remove('show');
    autoWrap.style.display = 'none';
    btn.textContent = '🎬 録画スタート (max 60s)';
    analyzeBtn.classList.remove('show');
    // 録画中なら停止
    if (isRecording) stopVideoRecording();
    document.getElementById('videoPreviewArea').classList.remove('show');
    document.getElementById('videoRecBar').classList.remove('show');
  }

function loadScreenshot(file) {
  const reader = new FileReader();
  reader.onload = (e) => {

  };

// ══════════════════════════════════════
// カメラ
// ══════════════════════════════════════
async function enumeratecameras() {
  const tempStream = await navigator.mediaDevices.getUserMedia({ video: true, audio: false });
  tempStream.getTracks().forEach(t => t.stop());
  const devices = await navigator.mediaDevices.enumerateDevices();
  videoDevices = devices.filter(d => d.kind === 'videoinput');
  return videoDevices;
}

function findBackCameraIndex(devices) {
  const kw = ['back', 'rear', 'environment', '背面', 'リア', '0'];
  for (let i = 0; i < devices.length; i++) {
    if (kw.some(k => devices[i].label.toLowerCase().includes(k))) return i;
  }
  return devices.length > 1 ? devices.length - 1 : 0;
}

async function startCamera(deviceIndex) {
  const statusDot = document.getElementById('statusDot');
  const statusText = document.getElementById('statusText');
  if (cameraStream) { cameraStream.getTracks().forEach(t => t.stop()); cameraStream = null; }

  try {
    if (videoDevices.length === 0) await enumeratecameras();
    let idx = (typeof deviceIndex === 'number' && deviceIndex >= 0) ? deviceIndex : findBackCameraIndex(videoDevices);
    currentDeviceIdx = idx;
    const device = videoDevices[idx];

    const stream = await navigator.mediaDevices.getUserMedia({
      video: { deviceId: { exact: device.deviceId }, width: { ideal: 1920 }, height: { ideal: 1080 } },
      audio: false,
    });
    cameraStream = stream;
    video.srcObject = stream;
    await video.play();

    const track = stream.getVideoTracks()[0];
    const label = track.label;
    const settings = track.getSettings();
    const isBack = settings.facingMode === 'environment' || /back|rear|背面|リア/i.test(label) || (videoDevices.length > 1 && idx === videoDevices.length - 1);

    statusDot.className = 'status-dot live';
    statusText.textContent = isBack ? 'バックカメラ' : 'フロントカメラ';
  } catch (err) {
    statusDot.className = 'status-dot off';
    statusText.textContent = 'カメラエラー';
    document.getElementById('cameraArea').innerHTML = `<div class="camera-error"><p>⚠️ カメラにアクセスできません<br>${err.message}</p><button class="capture-btn" onclick="location.reload()" style="margin-top:8px;padding:8px 20px">再試行</button></div>`;
  }
}

function switchCamera() {
  if (videoDevices.length <= 1) return;
  startCamera((currentDeviceIdx + 1) % videoDevices.length);
}

function captureFrame() {
  canvas.width = video.videoWidth;
  canvas.height = video.videoHeight;
  ctx.drawImage(video, 0, 0);
  return canvas.toDataURL('image/jpeg', 0.7).split(',')[1];
}

// ══════════════════════════════════════
// 動き検出
// ══════════════════════════════════════
function detectMotion() {
  if (!cameraStream || !video.videoWidth) return;
  const sw = 64, sh = 48;
  canvas.width = sw; canvas.height = sh;
  ctx.drawImage(video, 0, 0, sw, sh);
  const cur = ctx.getImageData(0, 0, sw, sh).data;
  if (!prevFrameData) { prevFrameData = cur; return; }
  let diff = 0;
  for (let i = 0; i < cur.length; i += 4) {
    if ((Math.abs(cur[i]-prevFrameData[i]) + Math.abs(cur[i+1]-prevFrameData[i+1]) + Math.abs(cur[i+2]-prevFrameData[i+2])) / 3 > 30) diff++;
  }
  prevFrameData = cur;
  const pct = (diff / (sw * sh)) * 100;
  const moving = pct > MOTION_THRESHOLD;
  const newInterval = moving ? MOTION_INTERVAL : STILL_INTERVAL;
  if (newInterval !== currentInterval) {
    currentInterval = newInterval;
    if (autoTimer) {
      clearInterval(autoTimer);
      autoTimer = setInterval(() => { if (!isProcessing) onCaptureClick(); }, currentInterval);
    }
  }
}

// ══════════════════════════════════════
// 撮影キュー管理
// ══════════════════════════════════════
function addToQueue(base64) {
  const id = ++queueIdCounter;
  const dataUrl = 'data:image/jpeg;base64,' + base64;
  captureQueue.push({ id, base64, dataUrl, status: 'pending', result: null });
  renderQueue();
  return id;
}

function removeFromQueue(id) {
  captureQueue = captureQueue.filter(q => q.id !== id);
  selectedQueueIds.delete(id);
  renderQueue();
}

function renderQueue() {
  const el = document.getElementById('captureQueue');
  const analyzeBtn = document.getElementById('analyzeAllBtn');
  const analyzeSelBtn = document.getElementById('analyzeSelectedBtn');
  const pendingCount = captureQueue.filter(q => q.status === 'pending').length;
  const selectedCount = selectedQueueIds.size;

  if (captureQueue.length === 0) {
    el.classList.remove('show');
    analyzeBtn.classList.remove('show');
    analyzeSelBtn.classList.remove('show');
    return;
  }

  el.classList.add('show');

  // 選択があるときは「選択を解析」ボタン、なければ「全て解析」ボタン
  if (selectedCount > 0 && currentMode === 'still') {
    analyzeSelBtn.classList.add('show');
    analyzeSelBtn.textContent = `🧠 選択を解析 (${selectedCount}枚)`;
    analyzeBtn.classList.remove('show');
  } else if (pendingCount > 0 && currentMode === 'still') {
    analyzeBtn.classList.add('show');
    analyzeBtn.textContent = `🧠 全て解析 (${pendingCount}枚)`;
    analyzeSelBtn.classList.remove('show');
  } else if (!isProcessing) {
    analyzeBtn.classList.remove('show');
    analyzeSelBtn.classList.remove('show');
  }

  el.innerHTML = captureQueue.map(q => {
    const statusClass = q.status;
    const isSelected = selectedQueueIds.has(q.id);
    const statusText = q.status === 'pending'
      ? (isSelected ? '✓ 選択中' : 'タップで選択')
      : q.status === 'analyzing' ? '解析中...'
      : `✓ ${q.result?.elapsed || ''}ms`;
    const selectedClass = isSelected ? ' selected' : '';
    // pendingの画像はタップで選択切替、doneの画像はタップで結果へスクロール
    const clickAction = q.status === 'pending'
      ? `toggleQueueSelect(${q.id})`
      : `scrollToResult(${q.id})`;
    return `<div class="queue-item ${statusClass}${selectedClass}">
      <button class="queue-remove" onclick="event.stopPropagation();removeFromQueue(${q.id})">×</button>
      <img src="${q.dataUrl}" onclick="${clickAction}">
      <span class="queue-select-badge">選択中</span>
      <span class="queue-status ${statusClass}">${statusText}</span>
    </div>`;
  }).join('');
}

function toggleQueueSelect(id) {
  if (selectedQueueIds.has(id)) {
    selectedQueueIds.delete(id);
  } else {
    selectedQueueIds.add(id);
  }
  renderQueue();
}

function scrollToResult(queueId) {
  const item = captureQueue.find(q => q.id === queueId);
  if (item && item.result) {
    const idx = resultList.findIndex(r => r.queueId === queueId);
    if (idx >= 0) {
      const cards = document.querySelectorAll('.result-card');
      if (cards[idx]) cards[idx].scrollIntoView({ behavior: 'smooth', block: 'center' });
    }
  }
}

// ══════════════════════════════════════
// メイン撮影ボタン
// ══════════════════════════════════════
function onCaptureClick() {
  if (currentMode === 'still') {
    // 連続撮影モード → キューに追加するだけ（カメラは止めない）
    if (!cameraStream) { alert('カメラが起動していません'); return; }
    const base64 = captureFrame();
    addToQueue(base64);

    // カメラを少し縮小して撮影キューを見やすくする
    if (captureQueue.length === 1) {
      document.getElementById('cameraArea').className = 'camera-area compact';
    }

    // 撮影フィードバック（短いフラッシュ）
    video.style.opacity = '0.3';
    setTimeout(() => { video.style.opacity = '1'; }, 100);

    document.getElementById('statusText').textContent = `${captureQueue.length}枚 撮影済み`;
    return;
  }

  if (currentMode === 'screenshot') {
    analyzeScreenshot();
    return;
  }

  if (currentMode === 'video') {
    if (!isRecording) {
      startVideoRecording();
    } else {
      stopVideoRecording();
    }
    return;
  }
}

// ══════════════════════════════════════
// キュー一括解析
// ══════════════════════════════════════
async function analyzeQueue() {
  const pending = captureQueue.filter(q => q.status === 'pending');
  if (pending.length === 0 || isProcessing) return;

  isProcessing = true;
  document.getElementById('captureBtn').disabled = true;
  document.getElementById('analyzeAllBtn').disabled = true;

  const bar = document.getElementById('processingBar');
  bar.classList.add('show');

  const prompt = document.getElementById('promptInput').value || null;
  const endpoint = speedMode === 'fast' ? '/analyze-fast' : '/analyze';
  let completed = 0;

  for (const item of pending) {
    item.status = 'analyzing';
    renderQueue();

    document.getElementById('procText').textContent = `解析中... (${completed + 1}/${pending.length})`;
    document.getElementById('procCount').textContent = speedMode === 'fast' ? '⚡高速' : '通常';

    const timeStr = new Date().toLocaleTimeString();

    try {
      const body = speedMode === 'fast'
        ? { image_base64: item.base64, prompt, speed: speedMode, provider: aiProvider }
        : { image_base64: item.base64, prompt, provider: aiProvider };

      const res = await fetch(`${BACKEND_URL}${endpoint}`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(body),
      });

      if (!res.ok) throw new Error(`HTTP ${res.status}`);
      const data = await res.json();

      item.status = 'done';
      item.result = { elapsed: data.elapsed_ms };

      if (speedMode === 'fast') {
        addResult({
          queueId: item.id, time: timeStr, elapsed: data.elapsed_ms,
          ocr: data.ocr_text, analysis: null,
          nextSteps: data.combined_analysis,
          capturedImage: item.dataUrl,
          speedMode: 'fast', provider: aiProvider, followups: []
        });
      } else {
        addResult({
          queueId: item.id, time: timeStr, elapsed: data.elapsed_ms,
          ocr: data.ocr_text, analysis: data.analysis,
          nextSteps: data.next_steps, deepAnalysis: data.deep_analysis,
          capturedImage: item.dataUrl,
          speedMode: 'normal', provider: aiProvider, followups: []
        });
      }

    } catch (err) {
      item.status = 'done';
      item.result = { elapsed: 0 };
      addResult({
        queueId: item.id, time: timeStr, elapsed: 0,
        ocr: '', analysis: `エラー: ${err.message}`, nextSteps: null,
        capturedImage: item.dataUrl, speedMode, provider: aiProvider, followups: []
      });
    }

    completed++;
    renderQueue();
  }

  bar.classList.remove('show');
  isProcessing = false;
  document.getElementById('captureBtn').disabled = false;
  document.getElementById('analyzeAllBtn').disabled = false;
  document.getElementById('statusText').textContent = `完了 ${completed}枚`;

  // 解析済みアイテムを3秒後にキューから自動削除
  setTimeout(() => {
    captureQueue = captureQueue.filter(q => q.status !== 'done');
    renderQueue();
  }, 3000);
}

        headers: { 'Content-Type': 'application/json' },

      });

      if (!res.ok) throw new Error(`HTTP ${res.status}`);
      const data = await res.json();

      item.status = 'done';
      item.result = { elapsed: data.elapsed_ms };

      if (speedMode === 'fast') {
        addResult({
          queueId: item.id, time: timeStr, elapsed: data.elapsed_ms,
          ocr: data.ocr_text, analysis: null,
          nextSteps: data.combined_analysis,
          capturedImage: item.dataUrl,
          speedMode: 'fast', provider: aiProvider, followups: []
        });

        addResult({
          queueId: item.id, time: timeStr, elapsed: data.elapsed_ms,

        });
      }

      item.status = 'done';
      item.result = { elapsed: 0 };

}

// ══════════════════════════════════════
// 動画録画（max 60秒）
// ══════════════════════════════════════
function startVideoRecording() {
  if (!cameraStream) { alert('カメラが起動していません'); return; }
  isRecording = true;
  recordedFrames = [];
  recordingStartTime = Date.now();

  const btn = document.getElementById('captureBtn');
  btn.textContent = '⏹ 録画停止';
  btn.style.background = '#e74c3c';

  // 録画バー表示
  document.getElementById('videoRecBar').classList.add('show');
  document.getElementById('videoPreviewArea').classList.remove('show');

  // タイマー更新
  updateRecTimer();
  recordingTimer = setInterval(() => {
    const elapsed = (Date.now() - recordingStartTime) / 1000;
    if (elapsed >= VIDEO_MAX_SECONDS) {
      stopVideoRecording();
      return;
    }
    updateRecTimer();
  }, 500);

  // 定期的にフレームキャプチャ
  captureVideoFrame(); // 最初の1枚
  videoCaptureTimer = setInterval(captureVideoFrame, VIDEO_CAPTURE_INTERVAL);
}

function captureVideoFrame() {
  if (!isRecording || !cameraStream) return;
  const base64 = captureFrame();
  const dataUrl = 'data:image/jpeg;base64,' + base64;
  const elapsed = ((Date.now() - recordingStartTime) / 1000).toFixed(1);
  recordedFrames.push({ base64, dataUrl, timestamp: elapsed });

  // フラッシュ
  video.style.opacity = '0.5';
  setTimeout(() => { video.style.opacity = '1'; }, 80);
}

function updateRecTimer() {
  const elapsed = Math.floor((Date.now() - recordingStartTime) / 1000);
  const mm = String(Math.floor(elapsed / 60)).padStart(2, '0');
  const ss = String(elapsed % 60).padStart(2, '0');
  document.getElementById('recTimer').textContent = `${mm}:${ss}`;
}

function stopVideoRecording() {
  isRecording = false;
  clearInterval(recordingTimer);
  clearInterval(videoCaptureTimer);
  recordingTimer = null;
  videoCaptureTimer = null;

  // 最後のフレームも追加
  if (cameraStream) {
    captureVideoFrame();
  }

  const btn = document.getElementById('captureBtn');
  btn.textContent = '🎬 録画スタート (max 60s)';
  btn.style.background = '';

  // 録画バー非表示
  document.getElementById('videoRecBar').classList.remove('show');

  // プレビュー表示
  showVideoPreview();
}

function showVideoPreview() {
  const area = document.getElementById('videoPreviewArea');
  const thumbs = document.getElementById('vpThumbs');
  const info = document.getElementById('vpInfo');

  const elapsed = ((Date.now() - recordingStartTime) / 1000).toFixed(0);
  info.textContent = `🎬 録画完了: ${recordedFrames.length}フレーム / ${elapsed}秒`;

  // サムネイル表示（最大10枚）
  const step = Math.max(1, Math.floor(recordedFrames.length / 10));
  const displayFrames = recordedFrames.filter((_, i) => i % step === 0).slice(0, 10);
  thumbs.innerHTML = displayFrames.map(f =>
    `<img src="${f.dataUrl}" title="${f.timestamp}s">`
  ).join('');

  area.classList.add('show');
  document.getElementById('cameraArea').className = 'camera-area compact';
}

function retakeVideo() {
  recordedFrames = [];
  document.getElementById('videoPreviewArea').classList.remove('show');
  document.getElementById('cameraArea').className = 'camera-area full';
}

async function analyzeVideoFrames() {
  if (recordedFrames.length === 0 || isProcessing) return;
  isProcessing = true;
  document.getElementById('captureBtn').disabled = true;

  const bar = document.getElementById('processingBar');
  bar.classList.add('show');

  const prompt = document.getElementById('promptInput').value || null;
  const endpoint = speedMode === 'fast' ? '/analyze-fast' : '/analyze';

  // 等間隔で最大5フレームを選んで解析
  const maxFrames = 5;
  const step = Math.max(1, Math.floor(recordedFrames.length / maxFrames));
  const framesToAnalyze = recordedFrames.filter((_, i) => i % step === 0).slice(0, maxFrames);

  let allOcr = [];
  let lastResult = null;

  for (let i = 0; i < framesToAnalyze.length; i++) {
    const frame = framesToAnalyze[i];
    document.getElementById('procText').textContent = `動画解析中... (${i + 1}/${framesToAnalyze.length})`;
    document.getElementById('procCount').textContent = `${frame.timestamp}s`;

    try {
      const body = speedMode === 'fast'
        ? { image_base64: frame.base64, prompt, speed: speedMode, provider: aiProvider }
        : { image_base64: frame.base64, prompt, provider: aiProvider };

      const res = await fetch(`${BACKEND_URL}${endpoint}`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(body),
      });

      if (!res.ok) continue;
      const data = await res.json();
      lastResult = data;
      allOcr.push(`[${frame.timestamp}s] ${data.ocr_text || ''}`);
    } catch (e) { /* skip frame */ }
  }

  // 結果をまとめて表示
  const timeStr = new Date().toLocaleTimeString();
  if (lastResult) {
    const combinedOcr = allOcr.join('\n---\n');
    if (speedMode === 'fast') {
      addResult({
        time: timeStr, elapsed: lastResult.elapsed_ms,
        ocr: combinedOcr, analysis: null,
        nextSteps: lastResult.combined_analysis,
        capturedImage: framesToAnalyze[framesToAnalyze.length - 1].dataUrl,
        speedMode: 'fast', provider: aiProvider, followups: [],
        videoFrameCount: recordedFrames.length,
      });
    } else {
      addResult({
        time: timeStr, elapsed: lastResult.elapsed_ms,
        ocr: combinedOcr, analysis: lastResult.analysis,
        nextSteps: lastResult.next_steps, deepAnalysis: lastResult.deep_analysis,
        capturedImage: framesToAnalyze[framesToAnalyze.length - 1].dataUrl,
        speedMode: 'normal', provider: aiProvider, followups: [],
        videoFrameCount: recordedFrames.length,
      });
    }
  }

  // クリーンアップ
  document.getElementById('videoPreviewArea').classList.remove('show');
  bar.classList.remove('show');
  isProcessing = false;
  document.getElementById('captureBtn').disabled = false;
  document.getElementById('statusText').textContent = `動画解析完了`;
}

// ══════════════════════════════════════
// 追加質問
// ══════════════════════════════════════
async function askFollowup(idx) {
  const input = document.getElementById(`followup-${idx}`);
  if (!input || !input.value.trim()) return;
  const question = input.value;
  input.value = '';
  const r = resultList[idx];
  r.followups.push({ question, answer: '回答中...' });
  renderResults();
  try {
    const res = await fetch(`${BACKEND_URL}/followup`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ ocr_text: r.ocr, previous_analysis: r.analysis || r.nextSteps, question, provider: aiProvider }),
    });
    if (!res.ok) throw new Error(`HTTP ${res.status}`);
    const data = await res.json();
    r.followups[r.followups.length - 1].answer = data.answer;
  } catch (err) {
    r.followups[r.followups.length - 1].answer = `エラー: ${err.message}`;
  }
  renderResults();
}

// ══════════════════════════════════════
// 自動モード
// ══════════════════════════════════════
function toggleAuto() {
  const t = document.getElementById('autoToggle');
  t.classList.toggle('on');
  if (t.classList.contains('on')) {
    prevFrameData = null;
    motionCheckTimer = setInterval(detectMotion, 500);
    autoTimer = setInterval(() => { if (!isProcessing) onCaptureClick(); }, currentInterval);
  } else {
    clearInterval(autoTimer); clearInterval(motionCheckTimer);
    autoTimer = null; motionCheckTimer = null;
  }
}

// ══════════════════════════════════════
// 結果描画
// ══════════════════════════════════════
function addResult(r) {
  resultList.unshift(r);
  if (resultList.length > 30) resultList.pop();
  renderResults();
}

function renderResults() {
  const c = document.getElementById('results');
  if (resultList.length === 0) {
    c.innerHTML = '<div class="empty-text">📷 撮影ボタンで連続撮影<br>🧠 まとめて解析ボタンで一括解析<br><br>⚡ 高速モードで2〜4秒</div>';
    return;
  }
  c.innerHTML = resultList.map((r, idx) => {
    const latest = idx === 0;
    let h = `<div class="result-card" style="opacity:${latest?'1':'0.6'}">`;
    h += `<div class="result-time">${r.time} (${r.elapsed}ms) ${latest?'<span class="badge">最新</span>':''}`;
    if (r.speedMode === 'fast') h += ' <span class="badge fast">⚡高速</span>';
    if (r.provider) {
      const pLabels = { claude: 'Claude', chatgpt: 'GPT', gemini: 'Gemini' };
      h += ` <span class="badge ${r.provider}">${pLabels[r.provider] || r.provider}</span>`;
    }
    h += `</div>`;

    // 撮影画像サムネイル
    if (r.capturedImage) {
      h += `<div style="margin-bottom:8px;text-align:center"><img src="${r.capturedImage}" style="max-width:100%;max-height:100px;border-radius:6px;border:1px solid #333"></div>`;
    }

    if (r.analysis) h += `<div class="section"><div class="section-title analysis">🧠 分析</div><div class="body-text">${esc(r.analysis)}</div></div>`;
    if (r.nextSteps) h += `<div class="next-steps-box"><div class="section-title nextsteps">✨ 次にやること</div><div class="body-text">${esc(r.nextSteps)}</div></div>`;
    if (r.deepAnalysis) h += `<div class="section" style="border-left:3px solid #a78bfa;padding-left:10px;border-bottom:none"><div class="section-title" style="color:#a78bfa">🔬 深掘り</div><div class="body-text">${esc(r.deepAnalysis)}</div></div>`;

    r.followups.forEach(f => { h += `<div class="followup-block"><div class="q-text">❓ ${esc(f.question)}</div><div class="a-text">${esc(f.answer)}</div></div>`; });

    h += `<div class="followup-row"><input class="followup-input" id="followup-${idx}" placeholder="追加質問..." onkeydown="if(event.key==='Enter'){event.preventDefault();askFollowup(${idx})}"><button class="ask-btn" onclick="askFollowup(${idx})">質問</button></div>`;
    h += `<div class="ocr-toggle" onclick="this.nextElementSibling.classList.toggle('show')">📝 テキスト ▼</div><div class="ocr-text">${esc(r.ocr)}</div>`;

    if (latest && currentMode !== 'screenshot') h += `<div class="expand-cam-btn" onclick="document.getElementById('cameraArea').className='camera-area full'">📷 カメラを大きく表示</div>`;
    h += `</div>`;
    return h;
  }).join('');
}

function esc(s) { return s ? s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/\n/g,'<br>') : ''; }

// ══════════════════════════════════════
// 向き検知 & カメラ自動リサイズ
// ══════════════════════════════════════
let currentOrientation = 'portrait';

function updateOrientation() {
  const isLandscape = window.matchMedia('(orientation: landscape)').matches;
  const prev = currentOrientation;
  currentOrientation = isLandscape ? 'landscape' : 'portrait';

  const badge = document.getElementById('orientBadge');
  if (badge) {
    badge.textContent = isLandscape ? '📱 横向き' : '📱 縦向き';
  }

  // 向きが変わった時、カメラが表示中ならフルに戻す
  if (prev !== currentOrientation) {
    const cam = document.getElementById('cameraArea');
    if (cam && !cam.classList.contains('hidden')) {
      cam.className = 'camera-area full';
    }
  }
}

// メディアクエリでリアルタイム検知（resizeよりも正確）
const orientQuery = window.matchMedia('(orientation: landscape)');
orientQuery.addEventListener('change', updateOrientation);

// screen.orientation API対応（より信頼性が高い）
if (screen.orientation) {
  screen.orientation.addEventListener('change', updateOrientation);
}

// 初期状態をセット
updateOrientation();

// ══════════════════════════════════════
// 初期化
// ══════════════════════════════════════
startCamera();
checkProviders();
</script>
